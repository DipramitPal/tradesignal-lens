name: Daily Market Brief

on:
  schedule:
    # Runs at 9:00 AM IST (3:30 AM UTC) every Monday through Friday
    - cron: '30 3 * * 1-5'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  generate_brief:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Speeds up installations

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Daily Market Brief
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
        REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'anthropic' }}
        LLM_MODEL: ${{ secrets.LLM_MODEL || 'claude-sonnet-4-20250514' }}
      run: |
        # Ensure data directories exist
        mkdir -p data/raw data/processed data/reports
        
        # Run the brief and save the report
        python main.py brief --save
        
    - name: Upload Daily Brief Artifact
      uses: actions/upload-artifact@v4
      with:
        name: daily-market-brief
        path: data/reports/daily_brief*.json
        retention-days: 5
