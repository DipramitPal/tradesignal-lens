name: Automated Market Quant Scan

on:
  schedule:
    # Runs at 3:45 PM IST (10:15 AM UTC) every Monday through Friday after market close
    - cron: '15 10 * * 1-5'
  workflow_dispatch:

jobs:
  scan_market:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Full Universe Scan
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        mkdir -p data/raw data/processed data/reports
        
        # Run a one-shot scan against the universe pre-scanner
        python main.py scan --universe

        # Alternatively, save watchlist results:
        # python main.py watchlist --save
        
    - name: Upload Scan Results
      uses: actions/upload-artifact@v4
      with:
        name: market-scan-results
        # Can be tweaked depending on where the bot outputs the report
        path: data/reports/watchlist_*.json 
        retention-days: 5
